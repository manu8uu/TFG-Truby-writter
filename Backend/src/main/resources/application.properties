# Base de datos en memoria ultrarrápida para los tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate creará las tablas al vuelo en el orden perfecto
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ESTO ES MAGIA: Le prohíbe a Spring leer tu schema.sql durante los tests
spring.sql.init.mode=never

# Apagamos cosas innecesarias para que los tests vuelen
spring.h2.console.enabled=false

# ===================================================================
# CONFIGURACIÓN DE SEGURIDAD (JWT) PARA ENTORNO DE PRUEBAS
# ===================================================================
project.jwt.signKey=ClaveSecretaSuperLargaYTotalmenteSeguraParaLlegarAlMinimoDeBitsDeJJWT1234567890
project.jwt.expirationMinutes=60