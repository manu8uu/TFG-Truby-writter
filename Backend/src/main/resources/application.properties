# Base de datos en memoria ultrarrápida para los tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.sql.init.mode=never

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
logging.level.org.springframework.security=DEBUG


# ===================================================================
# CONFIGURACIÓN DE SEGURIDAD (JWT) PARA ENTORNO DE PRUEBAS
# ===================================================================
project.jwt.signKey=ClaveSecretaSuperLargaYTotalmenteSeguraParaLlegarAlMinimoDeBitsDeJJWT1234567890
project.jwt.expirationMinutes=60